# ECP = E-ELT Construction Proposal
PM:
  circumscribing_diameter: [39.14634, 'm']
  collecting_area: [1089.7598, 'm^2'] # computed from the hexagonal segments
  f_ratio: [0.88, 'unitless'] # ECP
  segmentation: [hexagonal, 'unitless'] # ECP
  segmentation_parameters:
    segment_size: [1.45, 'meters'] # ECP
    number_segments: [798, 'unitless'] # ECP
    segment_gap: [0.004, 'm'] # ECP
  number_sectors: [6, 'unitless']
Instruments:
  Starshade:
    IWA: [54, 'mas'] # 54 mas from Jamila --> ~ 15 lam/D
    OWA: [254, 'mas'] # Set by DM, 128x128 --> 64 lam/D
    num_petals: [48, 'unitless']
    contrast: ../starshade/hoee_contrast_mas.csv # Soliman et al. 2024
    core_throughput: ../starshade/core_throughput_48p_HOEE.csv # core thru at 700 nm for 48 petals (since Soliman+2024 assumes 48)
  HARMONI:
    path: ../HARMONI/HARMONI.yaml
reflectivity: elt_M1_M6_reflectivities.csv # From IRDB